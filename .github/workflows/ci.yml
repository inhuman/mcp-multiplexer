name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
      - name: Public API coverage
        run: bash .github/scripts/check_api_coverage.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-1.26-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-1.26-
      - run: go vet ./...
      - run: go test -race -cover -timeout 5m ./...

  test-docker:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
      - run: docker --version
      - run: go test -tags integration_docker -race -timeout 5m ./...
