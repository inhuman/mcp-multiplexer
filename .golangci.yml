version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosec
    - gocritic
    - prealloc
    - ineffassign
    - revive

  settings:
    govet:
      enable:
        - shadow
    revive:
      rules:
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true

  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - gosec
          - gocritic
          - prealloc

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/inhuman/mcp-multiplexer
